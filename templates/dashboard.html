<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantPy 持仓仪表盘</title>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2332; --border: #2d3a4f;
      --text: #e7ecf3; --muted: #8b9cb3;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --up: #22c55e; --down: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.5;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }
    header {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 16px; margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
      padding: 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
    }
    button {
      border: none; border-radius: 8px; padding: 10px 16px;
      font-size: 0.875rem; cursor: pointer;
      background: var(--accent); color: #fff;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary { background: #334155; }
    button.secondary:hover:not(:disabled) { background: #475569; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-full { grid-template-columns: 1fr; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .panel-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-head h2 { font-size: 1.1rem; }
    .badge {
      font-size: 0.75rem; padding: 4px 10px; border-radius: 999px;
      background: #1e3a5f; color: #93c5fd;
    }
    .stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .stat label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .stat span { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .table-wrap { overflow-x: auto; padding: 0 12px 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) { text-align: left; }
    th { color: var(--muted); font-weight: 500; font-size: 0.75rem; }
    .up { color: var(--up); } .down { color: var(--down); }
    .empty { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 0.875rem; }
    .suggest-list { padding: 12px 20px 20px; list-style: none; }
    .suggest-list li {
      padding: 10px 12px; margin-bottom: 8px; border-radius: 8px;
      background: #111827; font-size: 0.875rem; color: #cbd5e1;
    }
    .suggest-list li span { color: var(--muted); margin-right: 8px; }
    .suggest-group { padding: 0 20px 12px; }
    .suggest-group h3 {
      font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 600;
    }
    .trade-form {
      padding: 12px 20px 16px; border-bottom: 1px solid var(--border);
      background: #111827;
    }
    .trade-form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px 10px;
    }
    @media (max-width: 600px) { .trade-form-grid { grid-template-columns: 1fr; } }
    .trade-form label {
      display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px;
    }
    .trade-form input, .trade-form select {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: #0f1419; color: var(--text);
      font-size: 0.875rem;
    }
    .trade-form-actions {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .trade-form-actions button { padding: 8px 14px; font-size: 0.8rem; }
    .form-tabs {
      display: flex; gap: 8px; padding: 12px 20px 0;
    }
    .form-tabs button {
      padding: 8px 14px; font-size: 0.8rem;
      background: #334155; color: #cbd5e1;
    }
    .form-tabs button.active { background: var(--accent); color: #fff; }
    .form-panel { display: none; }
    .form-panel.active { display: block; }
    .recent-trades {
      padding: 8px 20px 12px; border-bottom: 1px solid var(--border);
      font-size: 0.75rem; color: var(--muted); max-height: 72px; overflow-y: auto;
    }
    .recent-trades div { margin-bottom: 4px; color: #cbd5e1; }
    #toast {
      position: fixed; bottom: 24px; right: 24px; max-width: 360px;
      padding: 14px 18px; border-radius: 10px;
      background: #1e293b; border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(120%); opacity: 0;
      transition: transform 0.25s, opacity 0.25s; z-index: 100; font-size: 0.875rem;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--down); }
    #log-panel {
      margin-top: 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px; display: none;
    }
    #log-panel.open { display: block; }
    #log-panel pre {
      padding: 16px 20px; font-size: 0.75rem; color: var(--muted);
      white-space: pre-wrap; word-break: break-all;
      max-height: 240px; overflow-y: auto;
    }
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; width: min(900px, 100%); max-height: 85vh;
      display: flex; flex-direction: column;
    }
    .modal-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-body {
      padding: 20px; overflow-y: auto; font-size: 0.875rem;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #cbd5e1; line-height: 1.6;
    }
    .modal-body pre.report-text {
      font-family: "Cascadia Mono", "Microsoft YaHei Mono", Consolas, monospace;
      white-space: pre-wrap; margin: 0 0 1rem;
    }
    .report-table {
      width: 100%; border-collapse: collapse; margin: 12px 0 16px;
      font-size: 0.8125rem;
    }
    .report-table th, .report-table td {
      border: 1px solid var(--border); padding: 6px 10px; text-align: left;
    }
    .report-table th { background: #1e293b; color: #e2e8f0; white-space: nowrap; }
    .report-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .report-table td.tags { color: var(--muted); max-width: 280px; }
    .tag-list { font-size: 0.75rem; color: var(--muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>QuantPy 持仓仪表盘</h1>
        <p class="sub" id="server-time">加载中…</p>
        <p class="sub" style="font-size:0.75rem;color:#64748b">版本 v{{ app_version|default('2.5') }} · 实盘中线</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="secondary" id="btn-report" type="button">查看日报</button>
        <button class="secondary" id="btn-reload" type="button">刷新数据</button>
      </div>
    </header>

    <div class="toolbar">
      <button type="button" data-action="refresh">刷新行情</button>
      <button type="button" data-action="scan">超短扫描</button>
      <button type="button" data-action="report">生成日报</button>
      <button type="button" data-action="midterm">中线分析</button>
      <button type="button" data-action="sim" data-force="true">模拟选股</button>
      <button type="button" data-action="sim-review">模拟复盘</button>
      <button type="button" data-action="ai-learn">AI策略学习</button>
      <button type="button" data-action="sim-backtest" class="secondary">模拟回测(20日)</button>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head"><h2>个人持仓</h2><span class="badge">实盘中线</span></div>
        <div class="stats" id="portfolio-stats"></div>
        <div class="table-wrap" id="portfolio-table"></div>
        <div class="panel-head" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          <h2 style="font-size:0.95rem">中线个股推荐</h2>
          <span class="badge">未持仓</span>
        </div>
        <div class="table-wrap" id="midterm-rec-table"></div>
      </section>
      <section class="panel">
        <div class="panel-head"><h2>模拟持仓</h2><span class="badge">20万 · 最多3仓 · T+1</span></div>
        <div class="stats" id="sim-stats"></div>
        <div class="table-wrap" id="sim-table"></div>
      </section>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head"><h2>超短 TOP 10</h2><span class="badge" id="ultra-badge">缓存</span></div>
        <div class="table-wrap" id="ultra-table"></div>
      </section>
      <section class="panel" id="panel-suggest">
        <div class="panel-head">
          <h2>优化建议</h2>
          <span class="badge">中线 + 超短</span>
        </div>
        <div class="form-tabs">
          <button type="button" class="active" data-tab="portfolio">持仓管理</button>
          <button type="button" data-tab="trade">交易录入</button>
        </div>
        <form class="trade-form form-panel active" id="portfolio-form">
          <div class="trade-form-grid">
            <div><label>总资金</label><input id="pf-capital" type="number" step="1000" min="0" required /></div>
            <div>
              <label>编辑已有持仓</label>
              <select id="pf-edit"><option value="">新增持仓</option></select>
            </div>
            <div><label>代码</label><input id="pf-code" placeholder="600519" required /></div>
            <div><label>名称</label><input id="pf-name" placeholder="贵州茅台" required /></div>
            <div><label>数量</label><input id="pf-qty" type="number" min="1" required /></div>
            <div><label>成本价</label><input id="pf-cost" type="number" step="0.01" required /></div>
            <div><label>买入日期</label><input id="pf-buy-date" type="date" /></div>
            <div>
              <label>策略</label>
              <select id="pf-strategy">
                <option>中线</option><option>手动</option><option>趋势</option><option>波段</option><option>超短</option><option>涨停</option>
              </select>
            </div>
            <div style="grid-column:1/-1"><label>备注</label><input id="pf-note" placeholder="可选" /></div>
          </div>
          <div class="trade-form-actions">
            <button type="submit">保存持仓</button>
            <button type="button" class="secondary" id="btn-pf-clear">新增/清空</button>
            <button type="button" class="secondary" id="btn-pf-delete">删除此持仓</button>
          </div>
        </form>
        <form class="trade-form form-panel" id="trade-form">
          <div class="trade-form-grid">
            <div>
              <label>从持仓填充</label>
              <select id="tf-holding"><option value="">手动输入</option></select>
            </div>
            <div>
              <label>策略</label>
              <select id="tf-strategy">
                <option>手动</option><option>超短</option><option>涨停</option><option>趋势</option>
              </select>
            </div>
            <div>
              <label>同步实盘</label>
              <select id="tf-sync-action">
                <option value="sell">卖出扣减持仓</option>
                <option value="buy">买入增加持仓</option>
                <option value="none">仅记录日记</option>
              </select>
            </div>
            <div><label>代码</label><input id="tf-code" placeholder="600519" required /></div>
            <div><label>名称</label><input id="tf-name" placeholder="贵州茅台" required /></div>
            <div><label>买入日期</label><input id="tf-buy-date" type="date" required /></div>
            <div><label>买入价</label><input id="tf-buy-price" type="number" step="0.01" required /></div>
            <div><label>卖出日期</label><input id="tf-sell-date" type="date" required /></div>
            <div><label>卖出价</label><input id="tf-sell-price" type="number" step="0.01" required /></div>
            <div><label>数量</label><input id="tf-qty" type="number" value="100" min="1" /></div>
            <div><label>备注</label><input id="tf-note" placeholder="可选" /></div>
          </div>
          <div class="trade-form-actions">
            <button type="submit">录入交易</button>
            <button type="button" class="secondary" id="btn-fill-today">卖出日=今天</button>
          </div>
        </form>
        <div class="recent-trades" id="recent-trades">暂无交易记录</div>
        <div id="suggest-groups"></div>
      </section>
    </div>

    <div class="grid grid-full">
      <section class="panel">
        <div class="panel-head"><h2>模拟平仓记录</h2><span class="badge">最近10笔</span></div>
        <div class="table-wrap" id="closed-table"></div>
      </section>
    </div>

    <div id="log-panel"><pre id="log-text"></pre></div>
  </div>

  <div id="toast"></div>

  <div class="modal" id="report-modal">
    <div class="modal-box">
      <div class="modal-head">
        <strong id="report-title">每日报告</strong>
        <button class="secondary" id="btn-close-report" type="button">关闭</button>
      </div>
      <div class="modal-body" id="report-body">加载中…</div>
    </div>
  </div>

  <script>
    const fmtMoney = (n) => Number(n || 0).toLocaleString("zh-CN", { maximumFractionDigits: 0 });
    const fmtPct = (n) => {
      const v = Number(n || 0);
      const cls = v > 0 ? "up" : v < 0 ? "down" : "";
      return `<span class="${cls}">${v > 0 ? "+" : ""}${v.toFixed(2)}%</span>`;
    };

    function renderStats(el, items) {
      el.innerHTML = items.map(([label, value]) =>
        `<div class="stat"><label>${label}</label><span>${value}</span></div>`
      ).join("");
    }

    function renderTable(el, headers, rows, emptyText) {
      if (!rows.length) {
        el.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }
      const head = headers.map((h) => `<th>${h}</th>`).join("");
      const body = rows.map((cells) =>
        `<tr>${cells.map((c) => `<td>${c}</td>`).join("")}</tr>`
      ).join("");
      el.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function renderPortfolio(p) {
      const has = p.has_data;
      renderStats(document.getElementById("portfolio-stats"), [
        ["总资金", has ? `${fmtMoney(p.total_capital)} 元` : "—"],
        ["持仓市值", has ? `${fmtMoney(p.total_market_value)} 元` : "—"],
        ["浮动盈亏", has ? fmtPct(p.total_float_pnl_pct) : "—"],
        ["仓位占比", has ? `${p.invested_pct}%` : "—"],
      ]);
      renderTable(
        document.getElementById("portfolio-table"),
        ["代码", "名称", "趋势", "评分", "建议", "浮盈%", "占比%"],
        (p.positions || []).map((x) => [
          x.code, x.name,
          x.midterm_trend || "—",
          x.midterm_score || "—",
          x.midterm_action || "—",
          fmtPct(x.profit_pct), `${x.weight_pct}%`,
        ]),
        "暂无个人持仓。请编辑 data/portfolio_config.json 后运行 portfolio --init"
      );
      const rec = (p.midterm && p.midterm.recommendations) || [];
      renderTable(
        document.getElementById("midterm-rec-table"),
        ["代码", "名称", "评分", "涨幅%", "RSI", "理由"],
        rec.map((x) => [
          x.code, x.name, x.midterm_score,
          fmtPct(x.pct_chg), x.rsi || "—",
          `<span class="tag-list" title="${x.reason || ""}">${x.reason || ""}</span>`,
        ]),
        "点击「中线分析」生成推荐"
      );
    }

    function renderSim(s) {
      const cfg = s.config || {};
      renderStats(document.getElementById("sim-stats"), [
        ["总权益", `${fmtMoney(s.equity)} 元`],
        ["现金", `${fmtMoney(s.cash)} 元`],
        ["总收益", fmtPct(s.total_return_pct)],
        ["T+1 / 止损止盈", `${cfg.t_plus_one !== false ? "开启" : "关闭"} · ${cfg.stop_loss_pct || -3}% / +${cfg.take_profit_pct || 8}%`],
      ]);
      renderTable(
        document.getElementById("sim-table"),
        ["代码", "名称", "数量", "买入", "现价", "止损", "止盈", "浮盈%", "可卖"],
        (s.positions || []).map((x) => [
          x.code, x.name, x.quantity, x.buy_price, x.current_price,
          x.stop_loss, x.take_profit, fmtPct(x.profit_pct),
          x.t_plus_one_locked ? "T+1锁" : (x.sellable_today !== false ? "可卖" : "—"),
        ]),
        "模拟账户空仓（点击「模拟选股」）"
      );
      renderTable(
        document.getElementById("closed-table"),
        ["代码", "名称", "买入", "卖出", "收益%", "天数", "原因"],
        (s.closed_trades || []).map((x) => [
          x.code, x.name, x.buy_price, x.sell_price,
          fmtPct(x.profit_pct), x.hold_days, x.exit_reason || "",
        ]),
        "暂无平仓记录"
      );
    }

    function renderUltraShort(list) {
      renderTable(
        document.getElementById("ultra-table"),
        ["代码", "名称", "评分", "涨幅%", "换手%", "连板", "标签"],
        (list || []).map((x) => [
          x.code, x.name, x.ultra_short_score,
          fmtPct(x.pct_chg),
          x.turnover, x.consecutive_boards || 0,
          `<span class="tag-list" title="${x.tags || ""}">${x.tags || ""}</span>`,
        ]),
        "暂无扫描结果，点击「超短扫描」"
      );
    }

    function renderSuggestionGroup(title, list, emptyText) {
      if (!list || !list.length) {
        return `<div class="suggest-group"><h3>${title}</h3><ul class="suggest-list"><li class="empty" style="background:none">${emptyText}</li></ul></div>`;
      }
      const items = list.map((s, i) => `<li><span>${i + 1}.</span>${s}</li>`).join("");
      return `<div class="suggest-group"><h3>${title}</h3><ul class="suggest-list">${items}</ul></div>`;
    }

    function renderSuggestions(data) {
      const groups = data.suggestion_groups || {};
      const el = document.getElementById("suggest-groups");
      el.innerHTML =
        renderSuggestionGroup("个股复盘", groups.midterm_review, "点击「中线分析」") +
        renderSuggestionGroup("持仓优化", groups.midterm_optimize, "—") +
        renderSuggestionGroup("中线推荐", groups.midterm_recommend, "暂无推荐标的") +
        renderSuggestionGroup("实盘操作", groups.portfolio_actions, "暂无持仓或待刷新行情") +
        renderSuggestionGroup("仓位分析", groups.portfolio_summary, "—") +
        renderSuggestionGroup("历史学习", groups.learn, "录入交易后可获得个性化学习建议") +
        renderSuggestionGroup("AI 策略学习", groups.ai_learn, "每5交易日自动学习，或点击「AI策略学习」");
    }

    function renderRecentTrades(trades) {
      const el = document.getElementById("recent-trades");
      const list = trades?.trades || [];
      if (!list.length) {
        el.textContent = "暂无交易记录";
        return;
      }
      el.innerHTML = list.slice(0, 5).map((t) => {
        const cls = t.profit_pct > 0 ? "up" : t.profit_pct < 0 ? "down" : "";
        return `<div>${t.sell_date} ${t.name}(${t.code}) <span class="${cls}">${t.profit_pct > 0 ? "+" : ""}${Number(t.profit_pct).toFixed(2)}%</span> · ${t.strategy}</div>`;
      }).join("");
    }

    function fillPortfolioForm(portfolio) {
      document.getElementById("pf-capital").value = portfolio?.total_capital || 200000;
      const sel = document.getElementById("pf-edit");
      sel.innerHTML = '<option value="">新增持仓</option>';
      (portfolio?.positions || []).forEach((p, i) => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `${p.name}(${p.code}) ${p.quantity}@${p.cost_price}`;
        sel.appendChild(opt);
      });
      sel._positions = portfolio?.positions || [];
    }

    function applyPortfolioEdit(index) {
      const positions = document.getElementById("pf-edit")._positions || [];
      const p = positions[Number(index)];
      if (!p) {
        document.getElementById("pf-code").value = "";
        document.getElementById("pf-name").value = "";
        document.getElementById("pf-qty").value = "";
        document.getElementById("pf-cost").value = "";
        document.getElementById("pf-buy-date").value = "";
        document.getElementById("pf-note").value = "";
        return;
      }
      document.getElementById("pf-code").value = p.code;
      document.getElementById("pf-name").value = p.name;
      document.getElementById("pf-qty").value = p.quantity;
      document.getElementById("pf-cost").value = p.cost_price;
      document.getElementById("pf-note").value = p.note || "";
    }

    function switchFormTab(tab) {
      document.querySelectorAll(".form-tabs button").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      document.getElementById("portfolio-form").classList.toggle("active", tab === "portfolio");
      document.getElementById("trade-form").classList.toggle("active", tab === "trade");
    }

    function fillHoldingOptions(positions) {
      const sel = document.getElementById("tf-holding");
      sel.innerHTML = '<option value="">手动输入</option>';
      (positions || []).forEach((p, i) => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `${p.name}(${p.code}) 成本${p.cost_price} 现价${p.current_price}`;
        sel.appendChild(opt);
      });
      sel._positions = positions || [];
    }

    function applyHolding(index) {
      const positions = document.getElementById("tf-holding")._positions || [];
      const p = positions[Number(index)];
      if (!p) return;
      document.getElementById("tf-code").value = p.code;
      document.getElementById("tf-name").value = p.name;
      document.getElementById("tf-buy-price").value = p.cost_price;
      document.getElementById("tf-sell-price").value = p.current_price;
      document.getElementById("tf-qty").value = p.quantity;
    }

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function renderAll(data) {
      document.getElementById("server-time").textContent =
        `更新时间：${data.server_time}` + (data.report?.name ? ` · 日报：${data.report.name}` : "");
      renderPortfolio(data.portfolio);
      renderSim(data.sim);
      renderUltraShort(data.ultra_short);
      renderSuggestions(data);
      renderRecentTrades(data.trades);
      fillHoldingOptions(data.portfolio?.positions);
      fillPortfolioForm(data.portfolio);
    }

    async function submitPortfolio(ev) {
      ev.preventDefault();
      const payload = {
        total_capital: document.getElementById("pf-capital").value,
        code: document.getElementById("pf-code").value.trim(),
        name: document.getElementById("pf-name").value.trim(),
        quantity: document.getElementById("pf-qty").value,
        cost_price: document.getElementById("pf-cost").value,
        buy_date: document.getElementById("pf-buy-date").value,
        strategy: document.getElementById("pf-strategy").value,
        note: document.getElementById("pf-note").value.trim(),
      };
      setLoading(true);
      try {
        const res = await fetch("/api/portfolio/position", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const body = await parseJsonResponse(res);
        if (body.data) renderAll(body.data);
        showToast(body.message || "已保存", !body.ok);
      } catch (e) {
        showToast("保存失败: " + e.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function deletePortfolio() {
      const code = document.getElementById("pf-code").value.trim();
      if (!code) {
        showToast("请先选择或填写要删除的股票代码", true);
        return;
      }
      if (!confirm(`确认删除持仓 ${code}？`)) return;
      setLoading(true);
      try {
        const res = await fetch(`/api/portfolio/position/${encodeURIComponent(code)}`, {
          method: "DELETE",
        });
        const body = await parseJsonResponse(res);
        if (body.data) {
          renderAll(body.data);
          applyPortfolioEdit("");
          document.getElementById("pf-edit").value = "";
        }
        showToast(body.message || "已删除", !body.ok);
      } catch (e) {
        showToast("删除失败: " + e.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function submitTrade(ev) {
      ev.preventDefault();
      const syncAction = document.getElementById("tf-sync-action").value;
      const payload = {
        code: document.getElementById("tf-code").value.trim(),
        name: document.getElementById("tf-name").value.trim(),
        buy_date: document.getElementById("tf-buy-date").value,
        buy_price: document.getElementById("tf-buy-price").value,
        sell_date: document.getElementById("tf-sell-date").value,
        sell_price: document.getElementById("tf-sell-price").value,
        quantity: document.getElementById("tf-qty").value,
        strategy: document.getElementById("tf-strategy").value,
        note: document.getElementById("tf-note").value.trim(),
        sync_portfolio: syncAction !== "none",
        trade_action: syncAction === "buy" ? "buy" : "sell",
      };
      setLoading(true);
      try {
        const res = await fetch("/api/trades", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const body = await parseJsonResponse(res);
        if (body.data) renderAll(body.data);
        showToast(body.message || "已录入", !body.ok);
      } catch (e) {
        showToast("录入失败: " + e.message, true);
      } finally {
        setLoading(false);
      }
    }

    function showToast(msg, isError) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "show" + (isError ? " error" : "");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove("show"), 5000);
    }

    function setLoading(loading) {
      document.querySelectorAll(".toolbar button, #btn-reload, #btn-report").forEach((btn) => {
        btn.disabled = loading;
      });
    }

    async function loadDashboard() {
      const res = await fetch("/api/dashboard");
      const data = await parseJsonResponse(res);
      renderAll(data);
      return data;
    }

    async function parseJsonResponse(res) {
      const ct = res.headers.get("content-type") || "";
      if (!ct.includes("application/json")) {
        const text = await res.text();
        if (/^\s*</.test(text)) {
          throw new Error("服务返回 HTML（可能未重启 Web）。请 Ctrl+C 停止后重新运行: python web_app.py");
        }
        throw new Error(text.slice(0, 120) || `HTTP ${res.status}`);
      }
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.message || `HTTP ${res.status}`);
      }
      return data;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function isTableSeparator(cells) {
      return cells.length > 0 && cells.every((c) => /^[\s:-]+$/.test(c) && c.includes("-"));
    }

    function renderReportContent(text) {
      const body = document.getElementById("report-body");
      if (!text) {
        body.innerHTML = '<p class="empty">暂无报告，请先点击「生成日报」</p>';
        return;
      }

      const lines = String(text).split(/\r?\n/);
      const parts = [];
      let tableRows = [];

      function flushTable() {
        if (tableRows.length < 2) {
          tableRows.forEach((row) => parts.push(`<pre class="report-text">${escapeHtml(row.join("\n"))}</pre>`));
          tableRows = [];
          return;
        }
        const header = tableRows[0];
        const dataStart = isTableSeparator(tableRows[1]) ? 2 : 1;
        const numericCols = new Set([0, 3, 4, 5, 6]);
        let html = '<table class="report-table"><thead><tr>';
        header.forEach((cell, idx) => {
          const cls = numericCols.has(idx) ? ' class="num"' : "";
          html += `<th${cls}>${escapeHtml(cell.trim())}</th>`;
        });
        html += "</tr></thead><tbody>";
        for (let i = dataStart; i < tableRows.length; i++) {
          html += "<tr>";
          tableRows[i].forEach((cell, idx) => {
            let cls = "";
            if (idx === header.length - 1) cls = ' class="tags"';
            else if (numericCols.has(idx)) cls = ' class="num"';
            html += `<td${cls}>${escapeHtml(cell.trim())}</td>`;
          });
          html += "</tr>";
        }
        html += "</tbody></table>";
        parts.push(html);
        tableRows = [];
      }

      let textBuf = [];
      function flushText() {
        if (!textBuf.length) return;
        parts.push(`<pre class="report-text">${escapeHtml(textBuf.join("\n"))}</pre>`);
        textBuf = [];
      }

      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith("|") && trimmed.endsWith("|")) {
          flushText();
          tableRows.push(trimmed.slice(1, -1).split("|"));
        } else {
          if (tableRows.length) flushTable();
          textBuf.push(line);
        }
      }
      if (tableRows.length) flushTable();
      flushText();
      body.innerHTML = parts.join("");
    }

    function showReportModal(reportData) {
      const modal = document.getElementById("report-modal");
      modal.classList.add("open");
      document.getElementById("report-title").textContent = reportData?.name || "每日报告";
      renderReportContent(reportData?.content || "");
    }

    async function openReport(prefetched) {
      if (prefetched) {
        showReportModal(prefetched);
        return;
      }
      document.getElementById("report-body").innerHTML = "加载中…";
      document.getElementById("report-modal").classList.add("open");
      try {
        const res = await fetch("/api/report/latest");
        const data = await parseJsonResponse(res);
        showReportModal(data);
      } catch (e) {
        document.getElementById("report-body").textContent = "加载失败: " + e.message;
      }
    }

    async function runAction(action, force) {
      setLoading(true);
      const url = `/api/actions/${action}` + (force ? "?force=true" : "");
      try {
        const res = await fetch(url, { method: "POST" });
        const body = await parseJsonResponse(res);
        if (body.log) {
          document.getElementById("log-panel").classList.add("open");
          document.getElementById("log-text").textContent = body.log;
        }
        if (body.data) {
          if (body.ultra_short) body.data.ultra_short = body.ultra_short;
          renderAll(body.data);
        }
        if (action === "scan" && body.ultra_short) {
          document.getElementById("ultra-badge").textContent = "刚刚扫描";
        }
        if (action === "report" && body.ok) {
          openReport(body.report_content);
        }
        showToast(body.message || (body.ok ? "完成" : "失败"), !body.ok);
      } catch (e) {
        showToast("请求失败: " + e.message, true);
      } finally {
        setLoading(false);
      }
    }

    document.querySelectorAll("[data-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        runAction(btn.dataset.action, btn.dataset.force === "true");
      });
    });
    document.getElementById("btn-reload").addEventListener("click", loadDashboard);
    document.getElementById("btn-report").addEventListener("click", openReport);
    document.getElementById("btn-close-report").addEventListener("click", () => {
      document.getElementById("report-modal").classList.remove("open");
    });
    document.getElementById("report-modal").addEventListener("click", (e) => {
      if (e.target.id === "report-modal") e.target.classList.remove("open");
    });

    document.querySelectorAll(".form-tabs button").forEach((btn) => {
      btn.addEventListener("click", () => switchFormTab(btn.dataset.tab));
    });
    document.getElementById("portfolio-form").addEventListener("submit", submitPortfolio);
    document.getElementById("pf-edit").addEventListener("change", (e) => {
      applyPortfolioEdit(e.target.value);
    });
    document.getElementById("btn-pf-clear").addEventListener("click", () => {
      document.getElementById("pf-edit").value = "";
      applyPortfolioEdit("");
    });
    document.getElementById("btn-pf-delete").addEventListener("click", deletePortfolio);
    document.getElementById("trade-form").addEventListener("submit", submitTrade);
    document.getElementById("tf-holding").addEventListener("change", (e) => {
      if (e.target.value !== "") applyHolding(e.target.value);
    });
    document.getElementById("btn-fill-today").addEventListener("click", () => {
      document.getElementById("tf-sell-date").value = todayStr();
    });
    document.getElementById("tf-sell-date").value = todayStr();

    loadDashboard().catch((e) => showToast("加载失败: " + e.message, true));
  </script>
</body>
</html>
