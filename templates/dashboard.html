<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantPy 持仓仪表盘</title>
  <style>
    :root {
      --bg: #0f1419; --card: #1a2332; --border: #2d3a4f;
      --text: #e7ecf3; --muted: #8b9cb3;
      --accent: #3b82f6; --accent-hover: #2563eb;
      --up: #22c55e; --down: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.5;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 48px; }
    header {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 16px; margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 600; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px;
      padding: 16px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px;
    }
    button {
      border: none; border-radius: 8px; padding: 10px 16px;
      font-size: 0.875rem; cursor: pointer;
      background: var(--accent); color: #fff;
      transition: background 0.15s, opacity 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button.secondary { background: #334155; }
    button.secondary:hover:not(:disabled) { background: #475569; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .grid-full { grid-template-columns: 1fr; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .panel-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-head h2 { font-size: 1.1rem; }
    .badge {
      font-size: 0.75rem; padding: 4px 10px; border-radius: 999px;
      background: #1e3a5f; color: #93c5fd;
    }
    .stats {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .stat label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .stat span { font-size: 1rem; font-weight: 600; font-variant-numeric: tabular-nums; }
    .table-wrap { overflow-x: auto; padding: 0 12px 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) { text-align: left; }
    th { color: var(--muted); font-weight: 500; font-size: 0.75rem; }
    .up { color: var(--up); } .down { color: var(--down); }
    .empty { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 0.875rem; }
    .suggest-list { padding: 12px 20px 20px; list-style: none; }
    .suggest-list li {
      padding: 10px 12px; margin-bottom: 8px; border-radius: 8px;
      background: #111827; font-size: 0.875rem; color: #cbd5e1;
    }
    .suggest-list li span { color: var(--muted); margin-right: 8px; }
    #toast {
      position: fixed; bottom: 24px; right: 24px; max-width: 360px;
      padding: 14px 18px; border-radius: 10px;
      background: #1e293b; border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(120%); opacity: 0;
      transition: transform 0.25s, opacity 0.25s; z-index: 100; font-size: 0.875rem;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { border-color: var(--down); }
    #log-panel {
      margin-top: 20px; background: var(--card);
      border: 1px solid var(--border); border-radius: 12px; display: none;
    }
    #log-panel.open { display: block; }
    #log-panel pre {
      padding: 16px 20px; font-size: 0.75rem; color: var(--muted);
      white-space: pre-wrap; word-break: break-all;
      max-height: 240px; overflow-y: auto;
    }
    .modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; width: min(900px, 100%); max-height: 85vh;
      display: flex; flex-direction: column;
    }
    .modal-head {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-body {
      padding: 20px; overflow-y: auto; font-size: 0.875rem;
      font-family: Consolas, "Courier New", monospace; white-space: pre-wrap;
      color: #cbd5e1;
    }
    .tag-list { font-size: 0.75rem; color: var(--muted); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>QuantPy 持仓仪表盘</h1>
        <p class="sub" id="server-time">加载中…</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="secondary" id="btn-report" type="button">查看日报</button>
        <button class="secondary" id="btn-reload" type="button">刷新数据</button>
      </div>
    </header>

    <div class="toolbar">
      <button type="button" data-action="refresh">刷新行情</button>
      <button type="button" data-action="scan">超短扫描</button>
      <button type="button" data-action="report">生成日报</button>
      <button type="button" data-action="sim" data-force="true">模拟选股</button>
      <button type="button" data-action="sim-review">模拟复盘</button>
      <button type="button" data-action="sim-backtest" class="secondary">模拟回测(20日)</button>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head"><h2>个人持仓</h2><span class="badge">实盘记录</span></div>
        <div class="stats" id="portfolio-stats"></div>
        <div class="table-wrap" id="portfolio-table"></div>
      </section>
      <section class="panel">
        <div class="panel-head"><h2>模拟持仓</h2><span class="badge">20万 · 最多3仓</span></div>
        <div class="stats" id="sim-stats"></div>
        <div class="table-wrap" id="sim-table"></div>
      </section>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head"><h2>超短 TOP 10</h2><span class="badge" id="ultra-badge">缓存</span></div>
        <div class="table-wrap" id="ultra-table"></div>
      </section>
      <section class="panel">
        <div class="panel-head"><h2>优化建议</h2><span class="badge">仓位 + 学习</span></div>
        <ul class="suggest-list" id="suggest-list"></ul>
      </section>
    </div>

    <div class="grid grid-full">
      <section class="panel">
        <div class="panel-head"><h2>模拟平仓记录</h2><span class="badge">最近10笔</span></div>
        <div class="table-wrap" id="closed-table"></div>
      </section>
    </div>

    <div id="log-panel"><pre id="log-text"></pre></div>
  </div>

  <div id="toast"></div>

  <div class="modal" id="report-modal">
    <div class="modal-box">
      <div class="modal-head">
        <strong id="report-title">每日报告</strong>
        <button class="secondary" id="btn-close-report" type="button">关闭</button>
      </div>
      <div class="modal-body" id="report-body">加载中…</div>
    </div>
  </div>

  <script>
    const fmtMoney = (n) => Number(n || 0).toLocaleString("zh-CN", { maximumFractionDigits: 0 });
    const fmtPct = (n) => {
      const v = Number(n || 0);
      const cls = v > 0 ? "up" : v < 0 ? "down" : "";
      return `<span class="${cls}">${v > 0 ? "+" : ""}${v.toFixed(2)}%</span>`;
    };

    function renderStats(el, items) {
      el.innerHTML = items.map(([label, value]) =>
        `<div class="stat"><label>${label}</label><span>${value}</span></div>`
      ).join("");
    }

    function renderTable(el, headers, rows, emptyText) {
      if (!rows.length) {
        el.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }
      const head = headers.map((h) => `<th>${h}</th>`).join("");
      const body = rows.map((cells) =>
        `<tr>${cells.map((c) => `<td>${c}</td>`).join("")}</tr>`
      ).join("");
      el.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function renderPortfolio(p) {
      const has = p.has_data;
      renderStats(document.getElementById("portfolio-stats"), [
        ["总资金", has ? `${fmtMoney(p.total_capital)} 元` : "—"],
        ["持仓市值", has ? `${fmtMoney(p.total_market_value)} 元` : "—"],
        ["浮动盈亏", has ? fmtPct(p.total_float_pnl_pct) : "—"],
        ["仓位占比", has ? `${p.invested_pct}%` : "—"],
      ]);
      renderTable(
        document.getElementById("portfolio-table"),
        ["代码", "名称", "数量", "成本", "现价", "浮盈%", "占比%"],
        (p.positions || []).map((x) => [
          x.code, x.name, x.quantity, x.cost_price, x.current_price,
          fmtPct(x.profit_pct), `${x.weight_pct}%`,
        ]),
        "暂无个人持仓。请编辑 data/portfolio_config.json 后运行 portfolio --init"
      );
    }

    function renderSim(s) {
      const cfg = s.config || {};
      renderStats(document.getElementById("sim-stats"), [
        ["总权益", `${fmtMoney(s.equity)} 元`],
        ["现金", `${fmtMoney(s.cash)} 元`],
        ["总收益", fmtPct(s.total_return_pct)],
        ["止损/止盈", `${cfg.stop_loss_pct || -3}% / +${cfg.take_profit_pct || 8}%`],
      ]);
      renderTable(
        document.getElementById("sim-table"),
        ["代码", "名称", "数量", "买入", "现价", "止损", "止盈", "浮盈%"],
        (s.positions || []).map((x) => [
          x.code, x.name, x.quantity, x.buy_price, x.current_price,
          x.stop_loss, x.take_profit, fmtPct(x.profit_pct),
        ]),
        "模拟账户空仓（点击「模拟选股」）"
      );
      renderTable(
        document.getElementById("closed-table"),
        ["代码", "名称", "买入", "卖出", "收益%", "天数", "原因"],
        (s.closed_trades || []).map((x) => [
          x.code, x.name, x.buy_price, x.sell_price,
          fmtPct(x.profit_pct), x.hold_days, x.exit_reason || "",
        ]),
        "暂无平仓记录"
      );
    }

    function renderUltraShort(list) {
      renderTable(
        document.getElementById("ultra-table"),
        ["代码", "名称", "评分", "涨幅%", "换手%", "连板", "标签"],
        (list || []).map((x) => [
          x.code, x.name, x.ultra_short_score,
          fmtPct(x.pct_chg),
          x.turnover, x.consecutive_boards || 0,
          `<span class="tag-list" title="${x.tags || ""}">${x.tags || ""}</span>`,
        ]),
        "暂无扫描结果，点击「超短扫描」"
      );
    }

    function renderSuggestions(list) {
      const el = document.getElementById("suggest-list");
      if (!list || !list.length) {
        el.innerHTML = '<li class="empty" style="background:none">录入交易后可获得个性化建议</li>';
        return;
      }
      el.innerHTML = list.map((s, i) => `<li><span>${i + 1}.</span>${s}</li>`).join("");
    }

    function renderAll(data) {
      document.getElementById("server-time").textContent =
        `更新时间：${data.server_time}` + (data.report?.name ? ` · 日报：${data.report.name}` : "");
      renderPortfolio(data.portfolio);
      renderSim(data.sim);
      renderUltraShort(data.ultra_short);
      renderSuggestions(data.suggestions);
    }

    function showToast(msg, isError) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "show" + (isError ? " error" : "");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => t.classList.remove("show"), 5000);
    }

    function setLoading(loading) {
      document.querySelectorAll(".toolbar button, #btn-reload, #btn-report").forEach((btn) => {
        btn.disabled = loading;
      });
    }

    async function loadDashboard() {
      const res = await fetch("/api/dashboard");
      const data = await res.json();
      renderAll(data);
      return data;
    }

    async function openReport() {
      const modal = document.getElementById("report-modal");
      modal.classList.add("open");
      document.getElementById("report-body").textContent = "加载中…";
      try {
        const res = await fetch("/api/report/latest");
        const data = await res.json();
        document.getElementById("report-title").textContent = data.name || "每日报告";
        document.getElementById("report-body").textContent =
          data.content || "暂无报告，请先点击「生成日报」";
      } catch (e) {
        document.getElementById("report-body").textContent = "加载失败: " + e.message;
      }
    }

    async function runAction(action, force) {
      setLoading(true);
      const url = `/api/actions/${action}` + (force ? "?force=true" : "");
      try {
        const res = await fetch(url, { method: "POST" });
        const body = await res.json();
        if (body.log) {
          document.getElementById("log-panel").classList.add("open");
          document.getElementById("log-text").textContent = body.log;
        }
        if (body.data) {
          if (body.ultra_short) body.data.ultra_short = body.ultra_short;
          renderAll(body.data);
        }
        if (action === "scan" && body.ultra_short) {
          document.getElementById("ultra-badge").textContent = "刚刚扫描";
        }
        if (action === "report" && body.ok) {
          setTimeout(openReport, 300);
        }
        showToast(body.message || (body.ok ? "完成" : "失败"), !body.ok);
      } catch (e) {
        showToast("请求失败: " + e.message, true);
      } finally {
        setLoading(false);
      }
    }

    document.querySelectorAll("[data-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        runAction(btn.dataset.action, btn.dataset.force === "true");
      });
    });
    document.getElementById("btn-reload").addEventListener("click", loadDashboard);
    document.getElementById("btn-report").addEventListener("click", openReport);
    document.getElementById("btn-close-report").addEventListener("click", () => {
      document.getElementById("report-modal").classList.remove("open");
    });
    document.getElementById("report-modal").addEventListener("click", (e) => {
      if (e.target.id === "report-modal") e.target.classList.remove("open");
    });

    loadDashboard().catch((e) => showToast("加载失败: " + e.message, true));
  </script>
</body>
</html>
